<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>炫酷贪吃鱼 - Fancy Snake Fish</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 Tailwind CSS CDN 用于 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .glow-text {
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            color: #fff;
        }
        .btn-glow {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            transition: all 0.3s;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.8);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <!-- 顶部得分 -->
        <div class="absolute top-5 left-0 w-full flex justify-between px-8 text-white text-2xl font-bold uppercase tracking-widest opacity-80">
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="best-score">0</span></div>
        </div>

        <!-- 开始界面 -->
        <div id="start-screen" class="absolute inset-0 flex flex-col justify-center items-center interactive">
            <h1 class="text-6xl md:text-8xl font-black mb-8 glow-text tracking-tighter italic">NEON FISH</h1>
            <p class="text-cyan-400 mb-10 text-lg tracking-widest uppercase opacity-70">Slide to hunt • Grow to survive</p>
            <button id="start-btn" class="px-12 py-4 bg-cyan-500 text-black font-bold text-xl rounded-full btn-glow uppercase tracking-widest">Start Game</button>
            <div class="mt-12 text-gray-500 text-sm uppercase tracking-widest flex gap-8">
                <span>Arrows / WASD</span>
                <span>•</span>
                <span>Touch / Mouse</span>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="absolute inset-0 hidden flex flex-col justify-center items-center interactive opacity-0">
            <h2 class="text-5xl md:text-7xl font-black mb-4 text-red-500 italic tracking-tighter">GAME OVER</h2>
            <div class="text-white text-2xl mb-10 opacity-80 uppercase tracking-widest">Final Score: <span id="final-score">0</span></div>
            <button id="restart-btn" class="px-12 py-4 bg-white text-black font-bold text-xl rounded-full btn-glow uppercase tracking-widest hover:bg-cyan-400">Try Again</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
